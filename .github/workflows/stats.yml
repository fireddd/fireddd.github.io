name: Refresh stats

# Two triggers:
#   - schedule:          daily, unattended
#   - workflow_dispatch: the "Run workflow" button in the Actions tab. This is the
#                        refresh button — clickable by the repo owner, not by the
#                        public. A button on the public page could not do this
#                        without embedding a write token in the HTML.
on:
  schedule:
    - cron: "17 5 * * *" # 05:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # This runner has no ~/.claude and no Apple Health export, so update-stats.py
      # only refreshes the visit count here and keeps the committed token/health
      # numbers. Those are refreshed by the launchd job on the Mac.
      - name: Refresh stats
        env:
          GOATCOUNTER_SITE: ${{ secrets.GOATCOUNTER_SITE }}
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: python3 scripts/update-stats.py

      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no change"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: refresh stats [skip ci]"
          git push
